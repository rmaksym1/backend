databaseChangeLog:
  - changeSet:
      id: create-bookings-table
      author: rmaksym1
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                    unique: true
              - column:
                  name: full_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: instructor_hours
                  type: int
                  defaultValue: 0
              - column:
                  name: rental_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_rentals
                    referencedTableName: rentals
                    referencedColumnNames: id
              - column:
                  name: total_price
                  type: decimal(10, 2)
                  constraints:
                    nullable: false