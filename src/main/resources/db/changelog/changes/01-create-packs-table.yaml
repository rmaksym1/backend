databaseChangeLog:
  - changeSet:
      id: create-packs-table
      author: rmaksym1
      changes:
        - createTable:
            tableName: packs
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                    unique: true
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(1024)
              - column:
                  name: price_per_day
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: varchar(512)
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false